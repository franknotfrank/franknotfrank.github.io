    .c-header__tool {
      position: fixed;
      top: 0;

    }

    .c-header__trigger {
      cursor: pointer;
      position: relative;
      background-color: #fff;
      height: 70px;
      width: 70px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      z-index: 1001;
    }


    .c-header__bc {
       padding-top: 75px;
       position: fixed;
       margin-left: -15px;
}
    .c-header__bc ul li {
    display: -webkit-box;
    display: -ms-flexbox;
    display: flex
;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -ms-flex-direction: column;
    flex-direction: column;
    -webkit-box-align: center;
    -ms-flex-align: center;
    align-items: center;
}

    .c-header__bc ul li:before {
    background-color: #000;
    content: '';
    display: block;
    height: 80px;
    width: 0.5px;
    margin-bottom: 20px;
}

    .c-header__bc ul li a {
        color:black;
    font-size: 14px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    display: block;
    -webkit-writing-mode: vertical-rl;
    -ms-writing-mode: tb-rl;
    writing-mode: vertical-rl;
    font-family: "Open Sans", sans-serif;
}

    .c-header__trigger.active {
      background-color: #000;
    }

    .c-header__triggerWrap {
      position: relative;
      height: 19px;
      width: 20px;
    }

    .c-header__triggerWrap span {
      background-color: #000;
      width: 100%;
      height: 1px;
      position: absolute;
      left: 0;
      transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), background-color 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .c-header__triggerWrap span:nth-child(1) {
      top: 0;
    }

    .c-header__triggerWrap span:nth-child(2) {
      top: 9px;
    }

    .c-header__triggerWrap span:nth-child(3) {
      bottom: 0;
    }

    .c-header__trigger.active .c-header__triggerWrap span:nth-child(1) {
      transform: translateY(9px) rotate(45deg);
      background-color: #fff;
    }

    .c-header__trigger.active .c-header__triggerWrap span:nth-child(2) {
      opacity: 0;
    }

    .c-header__trigger.active .c-header__triggerWrap span:nth-child(3) {
      transform: translateY(-9px) rotate(-45deg);
      background-color: #fff;
    }

    .c-header__trigger:before {
      background-color: #000;
      content: '';
      display: block;
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 100%;
      transform: scaleX(0) skewX(30deg);
      transform-origin: top right;
    }

    .c-header__trigger:after {
      background-color: rgba(0, 0, 0, 0.9);
      content: '';
      display: block;
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .sidebar {
       font-family: 'DIN Condensed Bold', sans-serif;
       font-size:1.5rem;
       letter-spacing:2px;
      position: fixed;
      top: 0;
      left: -400px;
      width: 400px;
      height: 100%;
      background-color: #f5f5f5;
      padding: 20px;
      z-index: 999;
      opacity: 0;
      transform: translateX(-100%);
      transition: opacity 0.4s ease, transform 0.7s ease;
    }

    .sidebar.active {
      opacity: 1;
      transform: translateX(0);
      left: 0;
    }

    .sidebar ul {
      list-style: none;
      padding-top: 130px;
      margin: 0;
    }

    .sidebar ul li {
      padding: 15px 0;
      font-size: 1.5em;
      font-weight: bold;
      color: #000;
      cursor: pointer;
    }

    .sidebar ul li:hover {
      color: #333;
    }

    .sidebar ul li a {
        color:black;
         text-decoration: none;
    }  

      .sidebar ul li:last-child:after {
      content: '';
      margin-top:30px;
      background-color:black;
      display: block;
      height: 0.6px;
      width: 50px;
      position: absolute;
      
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 1);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0s linear 0.4s;
      z-index: 998;
    }

    .overlay.active {
      opacity: 0.5;
      visibility: visible;
      transition: opacity 0.4s ease;
    }

    .portfolio-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
      transform-origin: center;
    }




    .container {

.contact-section {
  font-family: "Open Sans", sans-serif;
}

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px; /* Space between rows */
}

/* Base style for Inputs and Textarea */
.contact-form input, 
.contact-form textarea {
  width: 100%;
  padding: 15px;
  border: 1px solid #999; /* Thin grey border */
  outline: none;
  font-size: 0.9rem;
  letter-spacing: 1px;
  box-sizing: border-box; /* Crucial for width alignment */
  transition: border-color 0.3s ease;
    font-family: "Open Sans", sans-serif;
}

/* Textarea specific height */
.contact-form textarea {
  resize: vertical; /* Allows user to grow height but not width */
  min-height: 200px;
}

/* Placeholder styling */
.contact-form input::placeholder, 
.contact-form textarea::placeholder {
  color: #999;
  font-weight: 300;
}

/* Focus effect */
.contact-form input:focus, 
.contact-form textarea:focus {
  border-color: #000;
}

/* The Black Button */
.submit-btn {
  background-color: #000;
  color: #fff;
  border: none;
  padding: 18px 40px;
  font-size: 0.85rem;
  font-weight: 100;
  letter-spacing: 2px;
  cursor: pointer;
  align-self: flex-start; /* Keeps button on the left */
  transition: background-color 0.3s ease;
    font-family: "Open Sans", sans-serif;
}

    <script>
  // Toggle hamburger to cross, sidebar, and overlay
const headerTrigger = document.querySelector('.c-header__trigger');
const sidebar = document.querySelector('.sidebar');
const overlay = document.querySelector('.overlay');
if (headerTrigger && sidebar && overlay) {
  headerTrigger.addEventListener('click', () => {
