  <script>
   // Function to get query parameter from URL
function getParameterByName(name, url) {
  if (!url) url = window.location.href;
  name = name.replace(/[\[\]]/g, '\\$&');
  const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
        results = regex.exec(url);
  if (!results) return null;
  if (!results[2]) return '';
  return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

async function fetchPortfolio() {
  const apiKey = 'AIzaSyDkBq1WZHB0ecQQrapT9h_DK0a4yQIEpDg';
  const spreadsheetId = '1Qbm0H_uwtTXvZ5U529QgRn4gzjoWDgOyJlDGbuE7weM';
  const range = 'Project Details!A1:J';
  const detailDiv = document.getElementById('detail-content');
  try {
    const response = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?key=${apiKey}`
    );
    if (!response.ok) {
      throw new Error(`HTTP error! Status: ${response.status}`);
    }
    const data = await response.json();
    if (!data.values || data.values.length === 0) {
      detailDiv.innerHTML = '<p>No data found.</p>';
      return [];
    }
    const headers = data.values[0].map(header => header.toLowerCase().replace(/\s/g, ''));
    return data.values.slice(1).map(row => {
      const rowData = {};
      headers.forEach((header, index) => {
        rowData[header] = row[index] || '';
      });
      return rowData;
    });
  } catch (error) {
    console.error('Error fetching portfolio:', error);
    detailDiv.innerHTML = '<p>Failed to load details. Please try again later.</p>';
    return [];
  }
}

async function displayDetail() {
  const id = getParameterByName('id');
  if (!id) {
    document.getElementById('detail-content').innerHTML = '<p>No ID provided.</p>';
    return;
  }

  const allItems = await fetchPortfolio();
  const item = allItems.find(item => item.id === id);

  if (!item) {
    document.getElementById('detail-content').innerHTML = '<p>Item not found.</p>';
    return;
  }

let gallerySlides = '';
      let hasGallery = false;
if (item.gallery && item.gallery.trim()) {
    const galleryUrls = item.gallery.split(',').map(url => url.trim()).filter(url => url.length > 0);
    if (galleryUrls.length > 0) {
        hasGallery = true;
        
        // 1. Create the actual slides
        const originalSlides = galleryUrls.map((url, index) => 
            `<div class="slide"><img src="${url}" alt="Slide ${index + 1}"></div>`
        ).join('');

        // 2. Wrap them with clones (Last slide at start, First slide at end)
        const firstClone = `<div class="slide clone"><img src="${galleryUrls[0]}"></div>`;
        const lastClone = `<div class="slide clone"><img src="${galleryUrls[galleryUrls.length - 1]}"></div>`;
        
        gallerySlides = lastClone + originalSlides + firstClone;
    }
}

  const detailDiv = document.getElementById('detail-content');
  detailDiv.innerHTML = `
    <div class="detail-image">
      <img src="${item.topimage}">
    </div>
    <div class="detail-info">
      <div class="detail-title">${item.title}</div>
      <div class="sub-title">${item.subtitle ? `<p>${item.subtitle}</p>` : ''}</div>
      <div class="slider-container">
        <div class="slider">
         ${gallerySlides}
         ${hasGallery && gallerySlides.split('<div').length > 2 ? `
        </div>
        <button class="nav-button prev" onclick="moveSlide(-1)"><span></span></i></button>
        <button class="nav-button next" onclick="moveSlide(1)"><span></span></i></button>
      </div>
       ` : ''}
      <div class="p-worksEntry__conAdd">
        <div class="p-worksEntry__conAdd__l">
          <hr class="p-worksEntry__conAddLine">
          <dl>
            <dt>Client</dt>
            <dd>${item.client ? `${item.client}` : ''}</dd>
          </dl>
          <dl>
            <dt>Date</dt>
            <dd>${item.date ? `${item.date}` : ''}</dd>
          </dl>
        </div>
        <div class="p-worksEntry__conAdd__r">
          <hr class="p-worksEntry__conAddLine">
          <dl>
            <dt>Description</dt>
            <dd>${item.description ? `${item.description}` : ''}</dd>
          </dl>
        </div>
      </div>
    </div>
  `;

  // Initialize slider after DOM update
  initializeSlider();
}

// Slider initialization function
function initializeSlider() {
    const slider = document.querySelector('.slider');
    const slides = document.querySelectorAll('.slide');
    if (slides.length <= 1) return;

    let currentIndex = 1; // Start at 1 because index 0 is the clone
    let isTransitioning = false;

    // Initial position (show the first real slide, not the clone)
    slider.style.transition = 'none';
    slider.style.transform = `translateX(-${currentIndex * 100}%)`;

    function moveSlide(direction) {
        if (isTransitioning) return;
        isTransitioning = true;

        currentIndex += direction;
        
        // Add transition back for the move
        slider.style.transition = 'transform 0.5s ease-in-out';
        slider.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    // This listener detects when the transition ends to handle the loop "jump"
    slider.addEventListener('transitionend', () => {
        isTransitioning = false;
        
        // If we are on the "First Slide Clone" (at the very end)
        if (currentIndex === slides.length - 1) {
            slider.style.transition = 'none'; // Snap instantly
            currentIndex = 1;
            slider.style.transform = `translateX(-${currentIndex * 100}%)`;
        }
        
        // If we are on the "Last Slide Clone" (at the very beginning)
        if (currentIndex === 0) {
            slider.style.transition = 'none'; // Snap instantly
            currentIndex = slides.length - 2;
            slider.style.transform = `translateX(-${currentIndex * 100}%)`;
        }
    });

    // Auto Play
    let autoPlay = setInterval(() => moveSlide(1), 5000);
    

    window.moveSlide = moveSlide;
}

// Toggle hamburger to cross, sidebar, and overlay
const headerTrigger = document.querySelector('.c-header__trigger');
const sidebar = document.querySelector('.sidebar');
const overlay = document.querySelector('.overlay');

  headerTrigger.addEventListener('click', () => {
    headerTrigger.classList.toggle('active');
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
  });
}

window.onload = displayDetail;
